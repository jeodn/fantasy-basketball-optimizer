season:
  current: "2025-26"
  previous: "2024-25"

scoring:
  # Which stat window to use for z-score calculations.
  # Options: stats_curr_season | stats_prev_season | stats_last_10
  stats_source: "stats_curr_season"

  # Categories to exclude from total score (e.g. punt_categories: [TO, FT%])
  punt_categories: []

  # Multiplier for each category. Default is 1.0.
  # Increase to make a category count more in the overall ranking.
  category_weights:
    "FG%": 1.5
    "FT%": 1.0
    "3PTM": 1.0
    "PTS": 0.8
    "REB": 1.0
    "AST": 1.2
    "ST": 1.0
    "BLK": 1.0
    "TO": 1.0

